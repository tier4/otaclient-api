name: Release API(Protocol Buffer) CI

permissions:
  contents: read
  packages: read
  actions: read

on:
  release:
    types: [published]
  # allow manually triggering the build
  workflow_dispatch:

jobs:
  build_python_packages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          # use the minimum py ver we support to generate the wheel
          python-version: 3.8

      - name: install build deps
        run: |
          python -m pip install -U pip
          python -m pip install -U build

      - name: build otaclient service API python package
        run: python -m build --wheel

      - name: upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-python-packages
          path: dist/*.whl

  post_build:
    runs-on: ubuntu-latest
    needs: [build_python_packages]
    permissions:
      contents: write
    steps:
    - name: checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

    - name: download python packages artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: artifacts-python-packages
        path: dist

    - name: calculate checksum
      uses: ./.github/actions/calculate_checksum
      with:
        file_patterns: '*.{whl}'
        directory: 'dist'

    - name: publish release artifacts
      if: ${{ github.event_name == 'release' }}
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v2
      with:
        files: |
          dist/*.whl
          dist/*.checksum
